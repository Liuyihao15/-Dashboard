<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霸王茶姬 · 投入测算看板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.header{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%);padding:20px 24px 12px;border-bottom:1px solid #30363d}
.header h1{font-size:22px;font-weight:700;color:#f0f6fc;display:flex;align-items:center;gap:10px}
.header .sub{color:#8b949e;font-size:12px;margin-top:3px}
.header .tag{display:inline-block;background:rgba(88,166,255,0.15);color:#58a6ff;padding:1px 10px;border-radius:10px;font-size:11px;margin-left:6px}
.controls{display:flex;gap:16px;padding:12px 24px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap;align-items:center}
.ctrl-group{display:flex;align-items:center;gap:8px}
.ctrl-group label{color:#8b949e;font-size:12px;white-space:nowrap}
.ctrl-group select,.ctrl-group input{background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:5px 10px;font-size:12px}
.ctrl-group input[type=number]{width:90px}
.ctrl-group input[type=range]{width:120px;accent-color:#58a6ff;padding:0}
.ctrl-group .val{color:#58a6ff;font-weight:600;font-size:13px;min-width:40px}
.container{max-width:1400px;margin:0 auto;padding:16px 24px}

/* Insight banner */
.insight-banner{background:linear-gradient(135deg,#0d1b2a,#1c2128);border:1px solid #1f6feb;border-radius:10px;padding:14px 18px;margin-bottom:16px}
.insight-banner h3{color:#58a6ff;font-size:14px;margin-bottom:6px}
.insight-banner p{color:#c9d1d9;font-size:12px;line-height:1.6}
.insight-banner .highlight{color:#d29922;font-weight:600}
.insight-banner .badge{display:inline-block;background:#21262d;border:1px solid #30363d;border-radius:3px;padding:0 7px;font-size:11px;color:#8b949e;margin:0 2px}

/* KPI */
.kpi-section{margin-bottom:18px}
.section-title{font-size:14px;font-weight:600;color:#58a6ff;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-title .badge{font-size:11px;background:#21262d;color:#8b949e;padding:1px 8px;border-radius:8px;font-weight:400}
.kpi-grid{display:grid;gap:10px}
.kpi-grid.c4{grid-template-columns:repeat(4,1fr)}
.kpi-grid.c5{grid-template-columns:repeat(5,1fr)}
.kpi-grid.c6{grid-template-columns:repeat(6,1fr)}
.kpi-grid.c7{grid-template-columns:repeat(7,1fr)}
.kpi-card{background:linear-gradient(135deg,#161b22,#1c2128);border:1px solid #30363d;border-radius:8px;padding:10px 12px}
.kpi-card .l{color:#8b949e;font-size:11px;margin-bottom:2px}
.kpi-card .v{font-size:17px;font-weight:700;color:#f0f6fc}
.kpi-card .v.gold{color:#d29922}
.kpi-card .v.cyan{color:#58a6ff}
.kpi-card .v.green{color:#3fb950}
.kpi-card .yoy{font-size:10px;margin-top:1px}
.kpi-card .yoy.up{color:#3fb950}
.kpi-card .yoy.down{color:#f85149}
.kpi-card .sub{font-size:10px;color:#8b949e;margin-top:1px}

/* Rebate cards */
.rebate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.rebate-card{background:linear-gradient(135deg,#161b22,#1c2128);border:1px solid #30363d;border-radius:8px;padding:12px 14px}
.rebate-card h3{font-size:13px;color:#58a6ff;margin-bottom:6px}
.rebate-card .row{display:flex;justify-content:space-between;padding:2px 0;font-size:11px}
.rebate-card .row .l{color:#8b949e}
.rebate-card .row .r{color:#e6edf3;font-weight:600}
.rebate-card .row.spotlight .r{color:#d29922;font-size:14px}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid #30363d;margin-bottom:14px}
.tab-btn{padding:8px 18px;background:transparent;border:none;color:#8b949e;font-size:12px;cursor:pointer;border-bottom:2px solid transparent}
.tab-btn:hover{color:#e6edf3;background:#161b22}
.tab-btn.active{color:#58a6ff;border-bottom-color:#58a6ff;font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.data-table th{background:#21262d;color:#8b949e;padding:6px 10px;text-align:right;font-weight:500;border-bottom:2px solid #30363d;white-space:nowrap}
.data-table th:first-child{text-align:left}
.data-table td{padding:5px 10px;text-align:right;border-bottom:1px solid #21262d;color:#e6edf3;font-size:12px}
.data-table td:first-child{text-align:left;color:#8b949e}
.data-table tr:hover td{background:rgba(88,166,255,0.05)}
.data-table tr.total td{font-weight:700;border-top:2px solid #58a6ff;color:#f0f6fc}
.data-table tr.h2 td{font-weight:600;color:#d29922}

@media(max-width:900px){
  .kpi-grid.c4,.kpi-grid.c5,.kpi-grid.c6,.kpi-grid.c7{grid-template-columns:repeat(2,1fr)}
  .rebate-grid,.comp-grid{grid-template-columns:1fr}
  .controls{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>

<div class="header">
<h1>📊 霸王茶姬 · 投放投入测算看板 <span class="tag">26年7月-27年6月</span></h1>
<div class="sub">品牌口径(预估实际) + 平台口径(TR目标) · 数据基于25年1月-26年6月历史</div>
</div>

<div class="controls">
  <div class="ctrl-group"><label>🔵 品牌TR(现金/营业额)</label><span class="val" id="brandTrVal">3.60%</span></div>
  <div class="ctrl-group"><label>🟡 平台目标TR</label>
    <select id="trSelect" onchange="switchTr(this.value)">
      <option value="0">4.78% (效果6.5%+品牌8.5%)</option>
      <option value="1">5.26% (效果7.5%+品牌9.5%)</option>
      <option value="2">5.74% (效果8.5%+品牌10.5%)</option>
    </select>
  </div>
</div>

<div class="container">

<!-- 🧠 测算逻辑 -->
<div class="insight-banner" id="insightBanner"></div>

<!-- 📌 品牌KPI -->
<div class="kpi-section">
  <div class="section-title">📌 品牌预估实际投入</div>
  <div class="kpi-grid c7" id="brandKpis"></div>
</div>

<!-- 📌 平台KPI -->
<div class="kpi-section">
  <div class="section-title">📌 平台目标口径 <span class="badge" id="trLabelBadge">4.78%</span></div>
  <div class="kpi-grid c5" id="platKpis"></div>
</div>

<!-- 📌 26H2 -->
<div class="kpi-section">
  <div class="section-title">📌 26H2（7月-12月）</div>
  <div class="kpi-grid c7" id="h2Kpis"></div>
</div>

<!-- 💰 返点 -->
<div class="kpi-section">
  <div class="section-title">💰 返点对比（平台口径现金消耗）</div>
  <div class="rebate-grid" id="rebateGrid"></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('tabBrand')">品牌实际 · 逐月</button>
  <button class="tab-btn" onclick="switchTab('tab478')">平台4.78%</button>
  <button class="tab-btn" onclick="switchTab('tab526')">平台5.26%</button>
  <button class="tab-btn" onclick="switchTab('tab574')">平台5.74%</button>
</div>

<div class="tab-content active" id="tabBrand"><table class="data-table"><thead id="brandHead"></thead><tbody id="brandBody"></tbody></table></div>
<div class="tab-content" id="tab478"><table class="data-table"><thead id="platHead0"></thead><tbody id="platBody0"></tbody></table></div>
<div class="tab-content" id="tab526"><table class="data-table"><thead id="platHead1"></thead><tbody id="platBody1"></tbody></table></div>
<div class="tab-content" id="tab574"><table class="data-table"><thead id="platHead2"></thead><tbody id="platBody2"></tbody></table></div>

</div>

<script>
const D = {"brand":{},"plat":{},"trs":[]};

function fmt(v) {return v>=1e8?(v/1e8).toFixed(2)+'亿':v>=1e4?(v/1e4).toFixed(0)+'万':v.toLocaleString()}
function pct(v) {return (v).toFixed(2)+'%'}
function pct1(v) {return (v).toFixed(1)+'%'}

function init(data) {
  D.brand = data.品牌口径;
  D.plat = data.平台口径;
  D.trs = data.TR档位;
  
  // 品牌KPI
  const bp = D.brand.预测;
  const bh = D.brand.历史;
  setKpi('brandKpis', [
    {l:'总消耗', v:fmt(bp.年含券消耗), y:(bp.年含券消耗/bh.含券消耗-1)*100},
    {l:'现金消耗', v:fmt(bp.年现金消耗), y:(bp.年现金消耗/bh.现金消耗-1)*100},
    {l:'含券消耗', v:fmt(bp.年含券消耗)+'(券'+fmt(bp.年含券消耗-bp.年现金消耗)+')'},
    {l:'渠道营业额', v:fmt(bp.年营业额), c:'gold', y:(bp.年营业额/bh.营业额-1)*100},
    {l:'广告GMV(原价)', v:fmt(bp.年广告GMV原价), c:'cyan', y:(bp.年广告GMV原价/bh.广告GMV原价-1)*100},
    {l:'TR(现金/营业额)', v:pct(bp.TR现金)},
    {l:'广告占比/ROI', v:pct(bp.广告占比原价)+' / '+bp.ROI原价.toFixed(2)},
  ]);
  
  // H2 KPI
  const h = D.brand.预测;
  setKpi('h2Kpis', [
    {l:'现金消耗', v:fmt(h.H2现金消耗)},
    {l:'含券消耗', v:fmt(h.H2含券消耗)},
    {l:'渠道营业额', v:fmt(h.H2营业额), c:'gold'},
    {l:'广告GMV(原价)', v:fmt(h.H2广告GMV), c:'cyan'},
    {l:'TR(现金)', v:pct(h.H2_TR现金)},
    {l:'广告占比', v:pct(h.H2_广告占比)},
    {l:'ROI', v:h.H2_ROI.toFixed(2)},
  ]);
  
  // 品牌逐月
  const cols = ['月份','现金消耗','含券消耗','券消耗','营业额','广告GMV原价','TR现金','TR含券','广告占比原价','ROI原价'];
  const pctCols = [false,false,false,false,false,false,true,true,true,true];
  D.brand.月度明细.forEach(d => d['月份'] = d.month);
  renderTable('brandHead','brandBody', D.brand.月度明细, cols, pctCols);
  
  // 平台TR档位
  switchTr(0);
  
  // 洞察
  renderInsight();
}

function setKpi(id, items) {
  document.getElementById(id).innerHTML = items.map(i => {
    let cls = '', yoyHtml = '';
    if(i.y !== undefined) {
      const cls = i.y > 1 ? 'up' : i.y < -1 ? 'down' : 'flat';
      yoyHtml = `<div class="yoy ${cls}">YoY ${i.y > 0 ? '+':''}${i.y.toFixed(1)}%</div>`;
    }
    return `<div class="kpi-card"><div class="l">${i.l}</div><div class="v ${i.c||''}">${i.v}</div>${yoyHtml}${i.s||''}</div>`;
  }).join('');
}

function renderTable(headId, bodyId, data, cols, pctCols) {
  const headCols = cols.map((c,i) => `<th>${c}</th>`).join('');
  document.getElementById(headId).innerHTML = `<tr>${headCols}</tr>`;
  
  let html = '';
  data.forEach(d => {
    html += '<tr><td>' + (d.month || '') + '</td>';
    for(let i=1; i<cols.length; i++) {
      const v = d[cols[i]];
      if(pctCols[i]) html += '<td>' + pct(v) + '</td>';
      else html += '<td>' + fmt(v) + '</td>';
    }
    html += '</tr>';
  });
  
  // H2小计
  const h2 = data.slice(0,6);
  html += '<tr class="h2"><td>26H2合计</td>';
  for(let i=1; i<cols.length; i++) {
    if(pctCols[i]) html += '<td>' + pct(h2.reduce((s,d) => s + d[cols[i]], 0) / h2.length) + '</td>';
    else html += '<td>' + fmt(h2.reduce((s,d) => s + d[cols[i]], 0)) + '</td>';
  }
  html += '</tr>';
  
  // 年合计
  html += '<tr class="total"><td>年合计</td>';
  for(let i=1; i<cols.length; i++) {
    if(pctCols[i]) html += '<td>' + pct(data.reduce((s,d) => s + d[cols[i]], 0) / data.length) + '</td>';
    else html += '<td>' + fmt(data.reduce((s,d) => s + d[cols[i]], 0)) + '</td>';
  }
  html += '</tr>';
  
  document.getElementById(bodyId).innerHTML = html;
}

function switchTr(idx) {
  idx = parseInt(idx);
  const tr = D.trs[idx];
  document.getElementById('trLabelBadge').textContent = tr.label;
  
  // 平台KPI
  setKpi('platKpis', [
    {l:'现金消耗', v:fmt(tr.年现金消耗), y:tr.YoY现金},
    {l:'大盘GMV(实付)', v:fmt(tr.年大盘GMV实付), c:'gold', y:tr.YoY_GMV实付},
    {l:'实付TR', v:pct(tr.TR*100)},
    {l:'实付广告占比', v:pct(tr.实付广告占比)+' / 原价'+pct(tr.原价广告占比)},
    {l:'实付ROI', v:tr.实付ROI.toFixed(2)+' / 原价'+tr.原价ROI.toFixed(2)},
  ]);
  
  // 返点对比
  renderRebates(idx);
  
  // 三个TR档位的逐月
  for(let i=0; i<3; i++) {
    const t = D.trs[i];
    const cols = ['month','现金消耗','含券消耗','大盘GMV实付','大盘GMV原价','广告实付GMV','广告原价GMV','实付TR','实付广告占比','原价广告占比','实付ROI','效果返点','品牌返点','返点小计'];
    const pctCols = [false,false,false,false,false,false,false,true,true,true,true,false,false,false];
    t.月度明细.forEach(d => d.month = d.month);
    const headId = 'platHead'+i;
    const bodyId = 'platBody'+i;
    const headCols = ['月份','现金消耗','含券消耗','大盘GMV实付','大盘GMV原价','广告实付GMV','广告原价GMV','实付TR','实付广告占比','原价广告占比','实付ROI','效果返点','品牌返点','返点小计']
      .map(c => `<th>${c}</th>`).join('');
    document.getElementById(headId).innerHTML = `<tr>${headCols}</tr>`;
    
    let html = '';
    t.月度明细.forEach(d => {
      html += '<tr><td>' + d.month + '</td>';
      for(let j=1; j<cols.length; j++) {
        const v = d[cols[j]];
        if(pctCols[j]) html += '<td>' + pct(v) + '</td>';
        else html += '<td>' + fmt(v) + '</td>';
      }
      html += '</tr>';
    });
    
    // H2
    const h2m = t.月度明细.slice(0,6);
    html += '<tr class="h2"><td>26H2合计</td>';
    for(let j=1; j<cols.length; j++) {
      if(pctCols[j]) {
        const avg = h2m.reduce((s,d) => s + d[cols[j]], 0) / h2m.length;
        html += '<td>' + pct(avg) + '</td>';
      } else html += '<td>' + fmt(h2m.reduce((s,d) => s + d[cols[j]], 0)) + '</td>';
    }
    html += '</tr>';
    
    // 年合计
    html += '<tr class="total"><td>年合计</td>';
    for(let j=1; j<cols.length; j++) {
      if(pctCols[j]) {
        html += '<td>' + pct(t.月度明细.reduce((s,d) => s + d[cols[j]], 0) / t.月度明细.length) + '</td>';
      } else html += '<td>' + fmt(t.月度明细.reduce((s,d) => s + d[cols[j]], 0)) + '</td>';
    }
    html += '</tr>';
    document.getElementById(bodyId).innerHTML = html;
  }
}

function renderRebates(activeIdx) {
  const grid = document.getElementById('rebateGrid');
  grid.innerHTML = D.trs.map((t,i) => `
    <div class="rebate-card" style="${i===activeIdx?'border-color:#58a6ff':''}">
      <h3>${t.label}</h3>
      <div class="row"><span class="l">现金消耗</span><span class="r">${fmt(t.年现金消耗)}</span></div>
      <div class="row"><span class="l">大盘GMV实付</span><span class="r">${fmt(t.年大盘GMV实付)}</span></div>
      <div class="row"><span class="l">广告实付GMV</span><span class="r">${fmt(t.年广告实付GMV)}</span></div>
      <div class="row"><span class="l">广告占比(实付)</span><span class="r">${pct(t.实付广告占比)}</span></div>
      <div class="row"><span class="l">广告占比(原价)</span><span class="r">${pct(t.原价广告占比)}</span></div>
      <div class="row"><span class="l">实付ROI / 原价ROI</span><span class="r">${t.实付ROI.toFixed(2)} / ${t.原价ROI.toFixed(2)}</span></div>
      <div class="row spotlight"><span class="l">💰 返点合计</span><span class="r">${fmt(t.返点合计)}</span></div>
      <div class="row"><span class="l">　效果返点(70%×${(t.效果返点/(t.年现金消耗*0.7)*100).toFixed(1)}%)</span><span class="r">${fmt(t.效果返点)}</span></div>
      <div class="row"><span class="l">　品牌返点(30%×${(t.品牌返点/(t.年现金消耗*0.3)*100).toFixed(1)}%)</span><span class="r">${fmt(t.品牌返点)}</span></div>
      <div class="row"><span class="l">YoY现金</span><span class="r" style="color:${t.YoY现金>0?'#3fb950':'#f85149'}">${t.YoY现金>0?'+':''}${t.YoY现金.toFixed(1)}%</span></div>
      <div class="row"><span class="l">YoY GMV实付</span><span class="r" style="color:${t.YoY_GMV实付>0?'#3fb950':'#f85149'}">${t.YoY_GMV实付>0?'+':''}${t.YoY_GMV实付.toFixed(1)}%</span></div>
    </div>
  `).join('');
}

function renderInsight() {
  const t = D.trs[0];
  const brand = D.brand.预测;
  const bh = D.brand.历史;
  // 三个TR的ROI
  const rois = D.trs.map(t => ({tr:(t.TR*100).toFixed(2), roi:t.实付ROI.toFixed(2), label:t.label}));
  document.getElementById('insightBanner').innerHTML = `
    <h3>🧠 测算逻辑 & 核心建议</h3>
    <p>
      <b>逻辑</b>：品牌口径TR=现金消耗/营业额(原价)，ROI=广告GMV原价/现金消耗，广告占比=广告GMV原价/营业额(原价)<br>
      平台口径TR=现金消耗/大盘GMV(实付)，实付广告占比=广告实付GMV/大盘GMV实付，实付ROI=广告实付GMV/现金消耗<br>
      <b>月环比设定</b>：基于历史趋势剔除异常值，8月+4%维持历史增幅，9-12月季节修正，27年1-6月按历史同期趋势<br>
      TO:TR提升→现金消耗增长(+3%~+6%)→ROI合理下降（9.00→8.37→7.83）→大盘GMV微降但广告GMV维持<br><br>
      <b>🎯 决策建议</b><br>
      品牌实际TR <span class="badge">3.60%</span>（近12月均值），年现金消耗 <span class="badge">${fmt(brand.年现金消耗)}</span>，稳健增长+0.5%<br>
      <b>TR ${rois[0].tr}%</b>：ROI=${rois[0].roi}，消耗${fmt(D.trs[0].年现金消耗)}，返点${fmt(D.trs[0].返点合计)} ← <span class="highlight">推荐签约</span><br>
      <b>TR ${rois[1].tr}%</b>：ROI=${rois[1].roi}，消耗${fmt(D.trs[1].年现金消耗)}，返点${fmt(D.trs[1].返点合计)}（消耗+3%，ROI-7%）<br>
      <b>TR ${rois[2].tr}%</b>：ROI=${rois[2].roi}，消耗${fmt(D.trs[2].年现金消耗)}，返点${fmt(D.trs[2].返点合计)}（消耗+6%，ROI-13%）<br>
      <span class="highlight">建议按品牌实际投入口径签约</span>，TR 4.78%档位（消耗与历史持平，ROI 9.00合理），返点约${fmt(D.trs[0].返点合计)}<br>
      若平台有更高TR要求，建议先签<span class="badge">4.78%</span>试用H2（￥${fmt(D.trs[0].年现金消耗/2)}），H1再评估调整
    </p>
  `;
}

function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// 加载数据
fetch('data.json').then(r=>r.json()).then(init).catch(()=>{
  // fallback: load inline
  init({});
});
</script>
